<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspire — Dashboard Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { accent: "#e6383c" },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "system-ui", "sans-serif"],
              inter: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      #detailFrame, #detailThumbnail { transform-origin: top left; }
      .nav-searching .nav-hide { opacity: 0; pointer-events: none; width: 0; overflow: hidden; }
      .nav-searching .nav-search { flex: 1; margin-left: 0; }
      .detail-panel {
        background: rgba(68, 68, 68, 0.62);
        border: 1px solid rgba(230, 56, 60, 0.45);
        box-shadow: inset -1px 1px 11px rgba(230, 56, 60, 0.45), 0 14px 26px rgba(0,0,0,0.12);
        backdrop-filter: blur(6px);
      }
      .detail-preview {
        background: rgba(68, 68, 68, 0.52);
        border: 1px solid rgba(230, 56, 60, 0.5);
        box-shadow: inset -1px 1px 11px rgba(230, 56, 60, 0.5), 0 14px 26px rgba(0,0,0,0.14);
      }
      .detail-card {
        min-height: 300px;
      }
      .detail-preview__canvas {
        min-height: 260px;
      }
      .detail-copy {
        overflow-wrap: anywhere;
        word-break: break-word;
        hyphens: auto;
        white-space: normal;
      }
      .detail-copy > * + * {
        margin-top: 0.75rem;
      }
      .detail-copy h3 {
        font-weight: 700;
      }
      .detail-copy ol,
      .detail-copy ul {
        padding-left: 1.4rem;
      }
      .detail-copy ol {
        list-style: decimal;
      }
      .detail-copy ul {
        list-style: disc;
      }
      .detail-copy-scroll {
        flex: 1;
        min-height: 0;
        max-height: 180px;
        overflow-y: auto;
        padding-right: 8px;
      }
      .detail-copy-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .detail-copy-scroll::-webkit-scrollbar-thumb {
        background: rgba(230,56,60,0.55);
        border-radius: 999px;
      }
      .detail-copy-scroll::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
      }
      .detail-back-button {
        background: rgba(68,68,68,0.72);
        border: 1px solid rgba(230,56,60,0.38);
        box-shadow: inset -1px 1px 11px rgba(230,56,60,0.56), 0 12px 22px rgba(0,0,0,0.18);
      }
      .detail-back-button:hover {
        filter: brightness(1.08);
      }
      @media (min-width: 1024px) {
        .detail-card {
          min-height: 318px;
        }
        .detail-preview__canvas {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body class="bg-[#10081d] font-sans text-white antialiased min-h-screen">
    <div class="overflow-x-hidden min-h-screen flex flex-col">

    <!-- Background layers -->
    <div class="fixed inset-0 pointer-events-none select-none z-0" aria-hidden="true">
      <img src="../assets/background-bro.png" alt="" class="absolute inset-0 w-full h-full object-cover" />
    </div>

    <!-- ===================== NAV ===================== -->
    <div class="relative z-50 sticky top-6 px-6 pt-2">
      <div id="navbar-placeholder" class="w-full max-w-[1311px] mx-auto"></div>
    </div>

    <!-- ===================== CONTENT ===================== -->
    <main class="relative z-10 w-full max-w-[1311px] mx-auto px-6 lg:px-0 py-12 pb-16">

      <!-- Loading state -->
      <div id="detailLoading" class="flex items-center justify-center py-24">
        <p class="text-white/40 text-sm">Loading dashboard...</p>
      </div>

      <!-- Error state -->
      <div id="detailError" class="flex flex-col items-center justify-center py-24 gap-4" style="display:none;">
        <p class="text-white/50 text-sm" id="detailErrorMsg">Dashboard not found.</p>
        <a href="home.html" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-white text-sm font-semibold transition-colors no-underline">← Back to Home</a>
      </div>

      <!-- Detail content -->
      <div id="detailContent" class="w-full flex flex-col gap-7" style="display:none;">

        <!-- Header row -->
        <div class="w-full flex flex-col gap-4">
          <a href="home.html" class="detail-back-button inline-flex items-center justify-center gap-2 w-fit min-w-[170px] h-9 px-4 rounded-full text-white text-base font-bold no-underline transition">
            <span class="text-[22px] leading-none" aria-hidden="true">←</span>
            <span>Back to Home</span>
          </a>
          <div class="flex flex-wrap items-center justify-between gap-4 mt-3">
            <h1 class="text-[32px] lg:text-[36px] font-bold leading-tight text-white text-left" id="detailTitle">Dashboard</h1>
            <span class="px-7 py-2.5 rounded-full text-white text-base font-bold shrink-0"
              id="detailFrequency"
              style="background: rgba(68,68,68,0.72); border: 1px solid rgba(230,56,60,0.38); box-shadow: inset -1px 1px 11px rgba(230,56,60,0.56), 0 12px 22px rgba(0,0,0,0.18);">
              Weekly Refresh
            </span>
          </div>
        </div>

        <!-- Main grid -->
        <div class="w-full grid grid-cols-1 lg:grid-cols-2 gap-5">

          <!-- Embed / thumbnail panel -->
          <article class="detail-preview detail-card rounded-[24px] overflow-hidden p-3">
            <div class="detail-preview__canvas relative block h-full rounded-[20px] overflow-hidden bg-black/20" id="detailPreviewLink">
              <iframe class="absolute inset-0 w-full h-full pointer-events-auto" id="detailFrame" title="Power BI dashboard" allow="fullscreen; clipboard-read; clipboard-write" allowfullscreen></iframe>
              <img class="absolute inset-0 w-full h-full object-cover pointer-events-none" id="detailThumbnail" alt="" />
              <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 text-white/50 pointer-events-none" id="detailEmpty">
                <strong class="text-white/70">Dashboard preview</strong>
                <span class="text-sm">Power BI URL belum tersedia untuk dashboard ini.</span>
              </div>
              <div class="absolute right-3 top-3 flex items-center gap-2 z-20">
                <button class="w-8 h-8 bg-white/85 hover:bg-white rounded-full border border-[#9a9a9a] text-[#5f5f5f] font-bold shadow-[0_2px_8px_rgba(0,0,0,0.18)] transition-colors" id="detailZoomIn" type="button" aria-label="Zoom in">+</button>
                <button class="w-8 h-8 bg-white/85 hover:bg-white rounded-full border border-[#9a9a9a] text-[#5f5f5f] font-bold shadow-[0_2px_8px_rgba(0,0,0,0.18)] transition-colors" id="detailZoomOut" type="button" aria-label="Zoom out">−</button>
                <a class="w-8 h-8 bg-white/85 hover:bg-white rounded-full border border-[#9a9a9a] flex items-center justify-center text-[#5f5f5f] font-bold shadow-[0_2px_8px_rgba(0,0,0,0.18)] transition-colors no-underline" id="detailOpenNewTab" href="#" target="_blank" rel="noopener" aria-label="Open in new tab">↗</a>
              </div>
            </div>
          </article>

          <article class="detail-panel detail-card rounded-[24px] px-8 pb-8 pt-6 lg:px-10 lg:pb-10 lg:pt-7 flex flex-col justify-start overflow-hidden">
            <h2 class="text-[22px] lg:text-[24px] font-bold text-white mb-5">Objective</h2>
            <div class="detail-copy detail-copy-scroll text-[16px] text-white leading-relaxed text-justify" id="detailObjective"></div>
          </article>

          <article class="detail-panel detail-card rounded-[24px] px-8 pb-8 pt-6 lg:px-10 lg:pb-10 lg:pt-7 flex flex-col justify-start overflow-hidden">
            <h2 class="text-[22px] lg:text-[24px] font-bold text-white mb-5">Data Usage</h2>
            <div class="detail-copy detail-copy-scroll text-[16px] text-white leading-relaxed text-justify" id="detailUsage"></div>
          </article>

          <article class="detail-panel detail-card rounded-[24px] px-8 pb-8 pt-6 lg:px-10 lg:pb-10 lg:pt-7 flex flex-col justify-start overflow-hidden">
            <h2 class="text-[22px] lg:text-[24px] font-bold text-white mb-5">Business Question</h2>
            <div class="detail-copy detail-copy-scroll text-[16px] text-white leading-relaxed text-justify" id="detailQuestion"></div>
          </article>

        </div>
      </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/detail.js"></script>
    </div>
  </body>
</html>
