<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspire — Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { accent: "#e6383c" },
            fontFamily: {
              sans: ["Poppins", "system-ui", "sans-serif"],
              inter: ["Poppins", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body, button, input, select, textarea {
        font-family: "Poppins", system-ui, sans-serif;
      }
      #detailFrame, #detailThumbnail { transform-origin: top left; }
      .nav-searching .nav-hide { opacity: 0; pointer-events: none; width: 0; overflow: hidden; }
      .nav-searching .nav-search { flex: 1; margin-left: 0; }
      .cards-scroll { scrollbar-width: none; }
      .cards-scroll::-webkit-scrollbar { display: none; }
      .archive-grid {
        grid-template-columns: repeat(auto-fill, minmax(292px, 292px));
      }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
    <script>
      const _q = new URLSearchParams(window.location.search).get("q");
      if (_q) document.documentElement.classList.add("search-mode");
    </script>
  </head>
  <body class="bg-[#140808] font-sans text-white antialiased min-h-screen">
    <div class="overflow-x-hidden min-h-screen flex flex-col">

    <!-- Background -->
    <div class="fixed inset-0 pointer-events-none select-none z-0" aria-hidden="true">
      <img src="../assets/background-bro.png" alt="" class="absolute inset-0 w-full h-full object-cover" />
    </div>

    <!-- ===================== NAV (rendered by js/navbar.js) ===================== -->
    <div class="sticky top-6 z-50 px-6 pt-2">
      <div id="navbar-placeholder" class="w-full max-w-[1311px] mx-auto"></div>
    </div>

    <!-- ===================== CONTENT ===================== -->
    <main class="relative z-10 w-full max-w-[1311px] mx-auto px-6 lg:px-0 py-12 pb-16 flex flex-col gap-8">

      <!-- Section title (JS updates this) -->
      <section class="flex flex-col gap-5 section-block--insights">
        <h2 class="section-block__title text-[32px] lg:text-[40px] font-bold text-[#f6f6f6] capitalize">Archive</h2>

        <!-- Cards grid (filled by JS) -->
        <div class="archive-grid grid gap-5 justify-start" id="allReports">
          <p class="text-white/40 text-sm py-8">Loading...</p>
        </div>
      </section>

      <!-- Hidden favorite container (JS needs it) -->
      <div id="favoriteReports" class="hidden"></div>

    </main>

    <script src="../js/config.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/archive.js"></script>
    </div>
  </body>
</html>
