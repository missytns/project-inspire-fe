<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspire — Dashboard Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { accent: "#e6383c" },
            fontFamily: {
              sans: ["Poppins", "system-ui", "sans-serif"],
              inter: ["Poppins", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body, button, input, select, textarea {
        font-family: "Poppins", system-ui, sans-serif;
      }
      body {
        -webkit-overflow-scrolling: touch;
      }
      #detailFrame, #detailThumbnail {
        border: 0;
        transform-origin: center center;
        transition: transform 180ms ease;
      }
      #detailFrame {
        display: block;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
      }
      .nav-searching .nav-hide { opacity: 0; pointer-events: none; width: 0; overflow: hidden; }
      .nav-searching .nav-search { flex: 1; margin-left: 0; }
      .detail-panel {
        background: rgba(68, 68, 68, 0.62);
        border: 1px solid rgba(230, 56, 60, 0.45);
        box-shadow: inset -1px 1px 11px rgba(230, 56, 60, 0.45), 0 14px 26px rgba(0,0,0,0.12);
        backdrop-filter: blur(6px);
      }
      .detail-preview {
        background: rgba(68, 68, 68, 0.52);
        border: 1px solid rgba(230, 56, 60, 0.5);
        box-shadow: inset -1px 1px 11px rgba(230, 56, 60, 0.5), 0 14px 26px rgba(0,0,0,0.14);
        box-sizing: border-box;
      }
      .detail-card {
        min-height: 280px;
      }
      .detail-preview__canvas {
        width: 100%;
        height: 100%;
        min-height: 220px;
        aspect-ratio: 16 / 6.2;
      }
      #detailThumbnail {
        object-fit: contain;
        object-position: center center;
        padding: 10px;
        box-sizing: border-box;
      }
      .detail-preview-controls {
        position: absolute;
        top: 12px;
        right: 18px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 8px;
        max-width: calc(100% - 88px);
      }
      .detail-preview-control {
        width: 32px;
        height: 32px;
        flex: 0 0 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid #9a9a9a;
        background: rgba(255, 255, 255, 0.9);
        color: #5f5f5f;
        font-size: 20px;
        font-weight: 700;
        line-height: 1;
        text-decoration: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        transition: background-color 160ms ease, transform 160ms ease;
        -webkit-tap-highlight-color: transparent;
      }
      .detail-preview-control img {
        width: 20px;
        height: 20px;
        display: block;
        pointer-events: none;
        user-select: none;
      }
      .detail-preview-control:hover {
        background: #ffffff;
      }
      .detail-preview-control:focus,
      .detail-preview-control:active,
      .detail-preview-control:visited {
        background: rgba(255, 255, 255, 0.9);
        color: #5f5f5f;
        outline: none;
      }
      .detail-preview-control:focus-visible {
        box-shadow: 0 0 0 3px rgba(95,95,95,0.22), 0 2px 8px rgba(0,0,0,0.18);
      }
      .detail-copy {
        overflow-wrap: anywhere;
        word-break: break-word;
        hyphens: auto;
        white-space: normal;
      }
      .detail-copy > * + * {
        margin-top: 0.75rem;
      }
      .detail-copy h3 {
        font-weight: 700;
      }
      .detail-copy ol,
      .detail-copy ul {
        padding-left: 1.4rem;
      }
      .detail-copy ol {
        list-style: decimal;
      }
      .detail-copy ul {
        list-style: disc;
      }
      .detail-copy-scroll {
        flex: 1;
        min-height: 0;
        max-height: 210px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-right: 8px;
      }
      .detail-copy-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .detail-copy-scroll::-webkit-scrollbar-thumb {
        background: rgba(230,56,60,0.55);
        border-radius: 999px;
      }
      .detail-copy-scroll::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
      }
      .detail-back-button {
        background: rgba(68,68,68,0.72);
        border: 1px solid rgba(230,56,60,0.38);
        box-shadow: inset -1px 1px 11px rgba(230,56,60,0.56), 0 12px 22px rgba(0,0,0,0.18);
      }
      .detail-back-button:hover {
        filter: brightness(1.08);
      }
      @media (min-width: 1024px) {
        .detail-card {
          min-height: 320px;
        }
        .detail-preview__canvas {
          min-height: 320px;
        }
      }
      @media (min-width: 1280px) {
        .detail-preview__canvas {
          min-height: 340px;
        }
      }
    </style>
  </head>
  <body class="bg-[#10081d] font-sans text-white antialiased min-h-screen">
    <div class="overflow-x-hidden min-h-screen flex flex-col">

    <!-- Background layers -->
    <div class="fixed inset-0 pointer-events-none select-none z-0" aria-hidden="true">
      <img src="../assets/background-bro.png" alt="" class="absolute inset-0 w-full h-full object-cover" />
    </div>

    <!-- ===================== NAV ===================== -->
    <div class="relative z-50 sticky top-6 px-6 pt-2">
      <div id="navbar-placeholder" class="w-full max-w-[1311px] mx-auto"></div>
    </div>

    <!-- ===================== CONTENT ===================== -->
    <main class="relative z-10 w-full max-w-[1311px] mx-auto px-6 lg:px-0 py-12 pb-16">

      <!-- Loading state -->
      <div id="detailLoading" class="flex items-center justify-center py-24">
        <p class="text-white/40 text-sm">Loading dashboard...</p>
      </div>

      <!-- Error state -->
      <div id="detailError" class="flex flex-col items-center justify-center py-24 gap-4" style="display:none;">
        <p class="text-white/50 text-sm" id="detailErrorMsg">Dashboard not found.</p>
        <a href="home.html" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-white text-sm font-semibold transition-colors no-underline">← Back to Home</a>
      </div>

      <!-- Detail content -->
      <div id="detailContent" class="w-full flex flex-col gap-7" style="display:none;">

        <!-- Header row -->
        <div class="w-full flex flex-col gap-5">
          <a href="home.html" class="detail-back-button inline-flex items-center justify-center gap-2 w-fit min-w-[170px] h-9 px-4 rounded-full text-white text-base font-bold no-underline transition">
            <span class="text-[22px] leading-none" aria-hidden="true">←</span>
            <span>Back to Home</span>
          </a>
          <div class="flex flex-wrap items-center justify-between gap-4 mt-1">
            <h1 class="text-[30px] sm:text-[36px] lg:text-[42px] font-bold leading-tight text-white text-left" id="detailTitle">Dashboard</h1>
            <span class="px-7 py-2.5 rounded-full text-white text-base font-bold shrink-0"
              id="detailFrequency"
              style="background: rgba(68,68,68,0.72); border: 1px solid rgba(230,56,60,0.38); box-shadow: inset -1px 1px 11px rgba(230,56,60,0.56), 0 12px 22px rgba(0,0,0,0.18);">
              Weekly Refresh
            </span>
          </div>
        </div>

        <!-- Main grid -->
        <div class="w-full flex flex-col gap-6">

          <div class="grid w-full grid-cols-1 lg:grid-cols-[2.05fr_1fr] gap-6">
            <!-- Embed / thumbnail panel -->
            <article class="detail-preview detail-card rounded-[18px] overflow-hidden p-3 flex">
              <div class="detail-preview__canvas relative block h-full rounded-[14px] overflow-hidden bg-black/20" id="detailPreviewLink">
                <iframe class="absolute inset-0 w-full h-full pointer-events-auto" id="detailFrame" title="Power BI dashboard" allow="fullscreen; clipboard-read; clipboard-write" allowfullscreen></iframe>
                <img class="absolute inset-0 w-full h-full object-contain bg-white pointer-events-none" id="detailThumbnail" alt="" />
                <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 text-white/50 pointer-events-none" id="detailEmpty">
                  <strong class="text-white/70">Dashboard preview</strong>
                  <span class="text-sm">Power BI URL belum tersedia untuk dashboard ini.</span>
                </div>
                <div class="detail-preview-controls">
                  <button class="detail-preview-control" id="detailZoomIn" type="button" aria-label="Zoom in">+</button>
                  <button class="detail-preview-control" id="detailZoomOut" type="button" aria-label="Zoom out">−</button>
                  <a class="detail-preview-control" id="detailOpenNewTab" href="#" target="_blank" rel="noopener" aria-label="Open in new tab">
                    <img src="../assets/dashboard/open-external-gray.svg" alt="" aria-hidden="true" />
                  </a>
                </div>
              </div>
            </article>

            <article class="detail-panel detail-card rounded-[18px] px-8 pb-8 pt-7 lg:px-8 lg:pb-8 lg:pt-8 flex flex-col justify-start overflow-hidden">
              <h2 class="text-[24px] lg:text-[28px] font-bold text-white mb-5 leading-tight inline-flex items-center gap-3">
                <span>Data Usage</span>
                <svg class="w-7 h-7 lg:w-8 lg:h-8" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 19V5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M4 19H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M8 16V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M12 16V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M16 16V13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </h2>
              <div class="detail-copy detail-copy-scroll text-[16px] lg:text-[18px] text-white leading-relaxed text-justify" id="detailUsage"></div>
            </article>
          </div>

          <div class="grid w-full grid-cols-1 lg:grid-cols-2 gap-6">
            <article class="detail-panel detail-card rounded-[18px] px-8 pb-8 pt-7 lg:px-9 lg:pb-9 lg:pt-8 flex flex-col justify-start overflow-hidden">
              <h2 class="text-[24px] lg:text-[28px] font-bold text-white mb-5 leading-tight inline-flex items-center gap-3">
                <span>Business Question</span>
                <svg class="w-7 h-7 lg:w-8 lg:h-8" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z" stroke="currentColor" stroke-width="2"/>
                  <path d="M12 17C14.7614 17 17 14.7614 17 12C17 9.23858 14.7614 7 12 7C9.23858 7 7 9.23858 7 12C7 14.7614 9.23858 17 12 17Z" stroke="currentColor" stroke-width="2"/>
                  <path d="M12 13.5C12.8284 13.5 13.5 12.8284 13.5 12C13.5 11.1716 12.8284 10.5 12 10.5C11.1716 10.5 10.5 11.1716 10.5 12C10.5 12.8284 11.1716 13.5 12 13.5Z" fill="currentColor"/>
                  <path d="M12 12L20 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M18.5 4H20V5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </h2>
              <div class="detail-copy detail-copy-scroll text-[16px] lg:text-[18px] text-white leading-relaxed text-justify" id="detailQuestion"></div>
            </article>

            <article class="detail-panel detail-card rounded-[18px] px-8 pb-8 pt-7 lg:px-9 lg:pb-9 lg:pt-8 flex flex-col justify-start overflow-hidden">
              <h2 class="text-[24px] lg:text-[28px] font-bold text-white mb-5 leading-tight inline-flex items-center gap-3">
                <span>Objective</span>
                <svg class="w-7 h-7 lg:w-8 lg:h-8" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z" stroke="currentColor" stroke-width="2"/>
                  <path d="M9.75 9.5C9.95 8.35 10.82 7.75 12 7.75C13.29 7.75 14.25 8.5 14.25 9.67C14.25 10.48 13.84 10.98 13.02 11.5C12.25 11.98 11.96 12.42 11.96 13.25" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M12 16.25H12.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
              </h2>
              <div class="detail-copy detail-copy-scroll text-[16px] lg:text-[18px] text-white leading-relaxed text-justify" id="detailObjective"></div>
            </article>
          </div>

        </div>
      </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/detail.js"></script>
    </div>
  </body>
</html>
