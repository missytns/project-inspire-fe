<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspire — Insights Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { accent: "#e6383c" },
            fontFamily: {
              sans: ["Poppins", "system-ui", "sans-serif"],
              inter: ["Poppins", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      .nav-searching .nav-hide { opacity: 0; pointer-events: none; width: 0; overflow: hidden; }
      .nav-searching .nav-search { flex: 1; margin-left: 0; }
      .cards-scroll { scrollbar-width: none; }
      .cards-scroll::-webkit-scrollbar { display: none; }
      #favorite {
        scroll-margin-top: 124px;
      }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .insight-tab:hover {
        color: #ffffff !important;
      }
      .insight-tab:active,
      .insight-tab.insight-tab--active {
        color: #ffffff !important;
      }
      .insight-tab.insight-tab--active .insight-tab__line {
        opacity: 1;
      }
      .insight-subfilter:hover {
        background: #FF5B5B !important;
        border-color: rgba(255,255,255,0.8) !important;
        color: #ffffff !important;
      }
      .insight-subfilter:active,
      .insight-subfilter.insight-subfilter--active {
        background: #e6383c !important;
        border-color: rgba(255,255,255,0.88) !important;
        color: #ffffff !important;
      }
      html.search-mode .home-hero,
      body.home-searching .home-hero {
        min-height: auto;
        overflow: visible;
        background: #140808;
      }
      html.search-mode .home-hero__decor,
      html.search-mode .home-hero__labels,
      html.search-mode .home-hero__copy,
      html.search-mode .home-hero__fade,
      body.home-searching .home-hero__decor,
      body.home-searching .home-hero__labels,
      body.home-searching .home-hero__copy,
      body.home-searching .home-hero__fade {
        display: none !important;
      }
      html.search-mode #favorite,
      html.search-mode .insight-tabs,
      html.search-mode #insightSubfilters,
      body.home-searching #favorite,
      body.home-searching .insight-tabs,
      body.home-searching #insightSubfilters {
        display: none !important;
      }
      html.search-mode .home-projects,
      body.home-searching .home-projects {
        padding-top: 32px;
        min-height: calc(100vh - 136px);
      }
      .home-hero__mobile-visual,
      .home-hero__mobile-labels,
      .home-hero__mobile-panels {
        display: none !important;
      }
      @media (min-width: 1024px) {
        .home-hero {
          min-height: 780px;
        }
        .home-hero__labels {
          display: none !important;
          grid-template-columns: repeat(2, max-content);
          justify-content: center;
          gap: 44px 190px;
          position: absolute !important;
          left: 50%;
          top: 415px;
          width: 640px;
          margin-left: 0;
          transform: translateX(-50%);
          z-index: 12;
          transition: opacity 0.16s ease, visibility 0.16s ease;
        }
        .home-hero__labels p {
          position: static !important;
          margin: 0;
        }
        .home-hero__labels p:last-child {
          grid-column: 1 / -1;
        }
        .home-hero__label-img {
          display: block;
          height: 18px;
          width: auto;
          opacity: 0.86;
        }
        .home-hero__decor-card {
          opacity: 1;
          z-index: 5;
        }
        .home-hero__side-card {
          z-index: 2;
        }
      }
      @media (max-width: 1023px) {
        .home-hero {
          min-height: 1000px;
          background:
            radial-gradient(circle at 50% 22%, rgba(230,56,60,0.24), transparent 34%),
            radial-gradient(circle at 20% 70%, rgba(132,24,68,0.18), transparent 34%),
            #10081d;
        }
        .home-hero__decor {
          opacity: 1;
        }
        .home-hero__decor > div:first-child img {
          opacity: 0.36;
          transform: translateY(-44px) scale(1.04);
          transform-origin: top center;
        }
        .home-hero__labels {
          display: none !important;
        }
        .home-hero__mobile-visual {
          display: none;
          position: absolute;
          pointer-events: none;
          user-select: none;
        }
        .home-hero__copy {
          width: min(100%, 560px);
          max-width: 560px;
          margin-left: auto;
          margin-right: auto;
          margin-top: 92px;
          padding-left: 28px;
          padding-right: 28px;
          gap: 28px;
        }
        .home-hero__copy h1 {
          max-width: 500px;
          margin-left: auto;
          margin-right: auto;
          text-align: center;
          font-size: clamp(34px, 8vw, 46px);
          line-height: 1.22;
        }
        .home-hero__copy a {
          width: min(100%, 220px);
          height: 52px;
        }
        .home-hero__mobile-labels {
          display: grid !important;
          grid-template-columns: repeat(2, minmax(0, max-content));
          justify-content: center;
          align-items: center;
          gap: 18px 20px;
          width: 100%;
          margin-top: 54px;
          padding-inline: 24px;
        }
        .home-hero__mobile-labels p {
          margin: 0;
        }
        .home-hero__mobile-labels p:last-child {
          grid-column: 1 / -1;
          justify-self: center;
        }
        .home-hero__mobile-labels .home-hero__label-img {
          height: 18px;
          max-width: 150px;
          object-fit: contain;
          opacity: 0.72;
        }
        .home-hero__mobile-panels {
          display: flex !important;
          position: relative;
          z-index: 10;
          flex-direction: column;
          gap: 20px;
          width: min(100% - 56px, 460px);
          margin: 52px auto 0;
        }
        .home-hero__mobile-panel {
          position: relative;
          overflow: hidden;
          border-radius: 14px;
        }
        .home-hero__mobile-panel--marketing {
          aspect-ratio: 883 / 488;
        }
        .home-hero__mobile-panel--insight {
          aspect-ratio: 1785 / 659;
        }
        .home-hero__mobile-panel img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: contain;
          opacity: 1;
        }
      }
      @media (max-width: 480px) {
        .home-hero {
          min-height: 860px;
        }
        .home-hero__copy {
          margin-top: 76px;
          padding-left: 22px;
          padding-right: 22px;
        }
        .home-hero__copy h1 {
          font-size: 34px;
          line-height: 1.24;
        }
        .home-hero__copy a {
          width: 206px;
          height: 50px;
        }
        .home-hero__copy a span:last-child {
          font-size: 16px;
        }
        .home-hero__mobile-labels {
          margin-top: 50px;
          gap: 16px 14px;
          padding-inline: 16px;
        }
        .home-hero__mobile-labels .home-hero__label-img {
          height: 16px;
          max-width: 136px;
        }
        .home-hero__mobile-panels {
          width: calc(100% - 56px);
          margin-top: 46px;
        }
      }
      @media (min-width: 1024px) {
        .home-hero__mobile-visual,
        .home-hero__mobile-labels,
        .home-hero__mobile-panels {
          display: none !important;
        }
      }
    </style>
    <script>
      const _q = new URLSearchParams(window.location.search).get("q");
      if (_q) document.documentElement.classList.add("search-mode");
    </script>
  </head>
  <body class="bg-[#10081d] font-sans text-white antialiased">
    <div class="overflow-x-hidden min-h-screen flex flex-col">

    <!-- ===================== HERO ===================== -->
    <section class="home-hero relative w-full min-h-[620px] lg:min-h-[780px] overflow-hidden bg-[#10081d]" aria-label="Hero">

      <!-- Background layers (decorative) -->
      <div class="home-hero__decor absolute inset-0 pointer-events-none" aria-hidden="true">
        <!-- Grid background -->
        <div class="absolute inset-0">
          <img src="../assets/background-bro.png" alt="" class="absolute inset-0 w-full h-full object-cover" />
        </div>
        <!-- Glow left -->
        <img src="../assets/dashboard/36c6878d1bfe7431c8ad94cd12b681989ec85bfa.svg" alt=""
          class="absolute -left-1/4 top-0 w-2/3 h-full opacity-60" />
        <!-- Glow right -->
        <img src="../assets/dashboard/aa49777440f9f308a7c9e4afa1d518074ffb66fe.svg" alt=""
          class="absolute -right-1/4 top-0 w-2/3 h-full opacity-60" />
        <!-- Mesh overlay -->
        <img src="../assets/dashboard/88f353fec0c6e6024ef31bd657731764177261c0.svg" alt=""
          class="absolute inset-0 w-full h-full object-cover opacity-40" />

        <!-- Chart images (visible on large screens) -->
        <img src="../assets/Group.png" alt="" class="home-hero__side-card hidden lg:block absolute left-5 top-[146px] w-[180px] h-auto object-contain opacity-70" />
        <img src="../assets/asset2.png" alt="" class="home-hero__side-card hidden lg:block absolute left-1 top-[272px] w-[250px] h-auto object-contain opacity-55" />
        <img src="../assets/asset3.png" alt="" class="home-hero__side-card hidden lg:block absolute right-5 top-[142px] w-[206px] h-auto object-contain opacity-55" />
        <img src="../assets/asset2.png" alt="" class="home-hero__side-card hidden lg:block absolute right-2 top-[270px] w-[250px] h-auto object-contain opacity-50" />
        <img src="../assets/marketing_innov.png" alt="" class="home-hero__decor-card hidden lg:block absolute left-[15%] top-[492px] w-[250px] h-auto object-contain" />
        <img src="../assets/bar_insightproject.png" alt="" class="home-hero__decor-card hidden lg:block absolute left-1/2 top-[532px] w-[500px] h-auto object-contain" />
      </div>

      <!-- NAV (rendered by js/navbar.js) -->
      <div id="navbar-placeholder" class="relative z-50 sticky top-6 mx-auto mt-5 lg:mt-8 w-[calc(100%-32px)] lg:w-[calc(100%-48px)] max-w-[1311px]"></div>

      <!-- Hero copy -->
      <div class="home-hero__copy relative z-10 flex flex-col items-center text-center px-6 mt-12 lg:mt-0 lg:absolute lg:top-[274px] lg:left-1/2 lg:-translate-x-1/2 lg:w-[760px] gap-8">
        <h1 class="text-4xl lg:text-[48px] font-bold leading-[1.1] text-[#f6f6f6] capitalize">
          The All-in-One Platform to Understand Insights
        </h1>
        <a class="flex items-center gap-3 w-[220px] lg:w-[240px] h-[52px] lg:h-[54px] justify-center rounded-full no-underline cursor-pointer"
          href="#favorite"
          style="border: 1px solid transparent; background: linear-gradient(rgba(51,5,5,1), rgba(51,5,5,1)) padding-box, linear-gradient(90deg, rgba(149,29,29,1), rgba(47,9,9,1)) border-box;">
          <span class="font-inter text-[18px] lg:text-[20px] text-[#fc8484]">✦</span>
          <span class="font-inter text-[16px] lg:text-[18px] text-[#ffd5d5]">Start to Explore</span>
        </a>

      </div>

      <div class="home-hero__labels hidden lg:grid pointer-events-none font-inter" aria-hidden="true">
        <p><img class="home-hero__label-img" src="../assets/knowledge-lib.png" alt="" /></p>
        <p><img class="home-hero__label-img" src="../assets/data-vis.png" alt="" /></p>
        <p><img class="home-hero__label-img" src="../assets/insight-data.png" alt="" /></p>
      </div>

      <div class="home-hero__mobile-labels lg:hidden" aria-hidden="true">
        <p><img class="home-hero__label-img" src="../assets/knowledge-lib.png" alt="" /></p>
        <p><img class="home-hero__label-img" src="../assets/data-vis.png" alt="" /></p>
        <p><img class="home-hero__label-img" src="../assets/insight-data.png" alt="" /></p>
      </div>

      <div class="home-hero__mobile-panels lg:hidden" aria-hidden="true">
        <div class="home-hero__mobile-panel home-hero__mobile-panel--marketing">
          <img src="../assets/marketing_innov.png" alt="" />
        </div>
        <div class="home-hero__mobile-panel home-hero__mobile-panel--insight">
          <img src="../assets/bar_insightproject.png" alt="" />
        </div>
      </div>

      <!-- Transition fade to content -->
      <div class="home-hero__fade absolute bottom-0 left-0 right-0 h-24 pointer-events-none z-20" aria-hidden="true"
        style="background: linear-gradient(to bottom, transparent, #140808);">
      </div>
    </section>

    <!-- ===================== CONTENT ===================== -->
    <section class="home-projects relative w-full bg-[#140808] pb-20 pt-8" aria-label="Projects">

      <!-- Background decoration -->
      <div class="absolute inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
        <img src="../assets/dashboard/2187296e0a7e381637a72ca4ba7e99ecf6fa5974.svg" alt=""
          class="w-full h-full object-cover opacity-60 rotate-180" />
      </div>

      <div class="relative z-10 max-w-[1300px] mx-auto px-6 lg:px-8 flex flex-col gap-12">

        <!-- Favorite section -->
        <section id="favorite" class="flex flex-col gap-5">
          <h2 class="text-[32px] lg:text-[39px] font-bold text-[#f6f6f6] capitalize">Favorite</h2>
          <div class="flex gap-2.5 overflow-x-auto cards-scroll pb-2" id="favoriteReports">
          </div>
        </section>

        <!-- All Insight Project section -->
        <section class="flex flex-col gap-5 section-block--insights">
          <h2 class="section-block__title text-[32px] lg:text-[40px] font-bold text-[#f6f6f6] capitalize">All Insight Project</h2>

          <!-- Insight tabs -->
          <nav class="insight-tabs flex items-end gap-10 flex-wrap" aria-label="Insight filters">
            <button class="insight-tab flex flex-col items-start gap-1.5 w-[116px] px-0 py-0 bg-transparent border-0 text-white/70 text-[22px] lg:text-[24px] font-normal leading-tight transition-colors" type="button" data-insight-filter="workspace">
              Workspace
              <span class="insight-tab__line block w-full h-px bg-white/70 opacity-80"></span>
            </button>
            <button class="insight-tab flex flex-col items-start gap-1.5 w-[130px] px-0 py-0 bg-transparent border-0 text-white/70 text-[22px] lg:text-[24px] font-normal leading-tight transition-colors" type="button" data-insight-filter="environment">
              Environment
              <span class="insight-tab__line block w-full h-px bg-white/70 opacity-80"></span>
            </button>
            <button class="insight-tab flex flex-col items-start gap-1.5 w-[108px] px-0 py-0 bg-transparent border-0 text-white/70 text-[22px] lg:text-[24px] font-normal leading-tight transition-colors" type="button" data-insight-filter="frequency">
              Frequency
              <span class="insight-tab__line block w-full h-px bg-white/70 opacity-80"></span>
            </button>
          </nav>

          <!-- Subfilters -->
          <div class="flex items-center gap-2 flex-wrap" id="insightSubfilters" aria-label="Insight subfilters" hidden></div>

          <!-- Cards grid -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 justify-items-center" id="allReports">
          </div>
        </section>

      </div>
    </section>

    <script src="../js/config.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/home.js"></script>
    </div>
  </body>
</html>
