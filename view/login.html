<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Inspire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { accent: "#e6383c" },
            fontFamily: { sans: ["Poppins", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body, button, input, select, textarea {
        font-family: "Poppins", system-ui, sans-serif;
      }
      .login-card {
        background: linear-gradient(160deg, #2a1a1a 0%, #1a0f0f 60%, #120808 100%);
        box-shadow: 0 0 0 1px rgba(230,56,60,0.45), 0 0 48px rgba(230,56,60,0.18), 0 24px 48px rgba(0,0,0,0.5);
      }
      .login-input {
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(255,255,255,0.12);
        transition: border-color 0.2s;
      }
      .login-input:focus {
        outline: none;
        border-color: rgba(230,56,60,0.55);
      }
      .login-btn {
        background: linear-gradient(90deg, #c0282c 0%, #e6383c 50%, #c0282c 100%);
        box-shadow: 0 4px 20px rgba(230,56,60,0.35);
        transition: opacity 0.2s, box-shadow 0.2s;
      }
      .login-btn:hover { opacity: 0.92; box-shadow: 0 6px 28px rgba(230,56,60,0.5); }
      .login-btn:active { opacity: 0.85; }
      .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    </style>
  </head>
  <body class="bg-[#10081d] font-sans text-white antialiased">
    <div class="overflow-x-hidden min-h-screen flex items-center justify-center p-4">

      <!-- Background -->
      <div class="fixed inset-0 pointer-events-none select-none z-0" aria-hidden="true">
        <img src="../assets/background-bro.png" alt="" class="absolute inset-0 w-full h-full object-cover" />
      </div>

      <!-- Login card -->
      <main class="login-card relative z-10 w-full max-w-[420px] rounded-2xl p-8 sm:p-10" aria-label="Login">
        <form class="flex flex-col gap-6" id="loginForm">

          <div class="flex flex-col gap-1">
            <h1 class="text-[28px] font-bold text-white leading-tight">Welcome Back!</h1>
            <p class="text-sm text-white/50">Login to your account.</p>
          </div>

          <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-white/70" for="email">Email</label>
              <input
                class="login-input w-full rounded-xl px-4 py-3 text-sm text-white placeholder-white/25"
                type="email" id="email" name="email"
                placeholder="you@example.com" autocomplete="email" required
              />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-white/70" for="password">Password</label>
              <input
                class="login-input w-full rounded-xl px-4 py-3 text-sm text-white placeholder-white/25"
                type="password" id="password" name="password"
                placeholder="••••••••" autocomplete="current-password" required
              />
            </div>
          </div>

          <p class="text-sm text-accent font-medium min-h-5 -mt-2" id="loginError" role="alert" hidden></p>

          <button class="login-btn w-full py-3.5 rounded-full text-white font-semibold text-sm" type="submit">
            Login
          </button>

        </form>
      </main>

    </div>
    <script src="../js/config.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
